<!-- @dsCard group="Widgets" viewport="240x320" name="GIF" subtitle="Full-screen pixel-art frame" -->
<!-- @startingPoint section="Widgets" subtitle="Full-screen pixel-art frame" viewport="240x320" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=240, height=320">
<title>Desky · GIF</title>
<link rel="stylesheet" href="styles.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; image-rendering: pixelated;
  }
  .screen {
    width: 240px; height: 320px; background: var(--bg);
    overflow: hidden; position: relative;
  }
  .px {
    position: absolute; inset: 0;
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(20, 1fr);
  }
  .px div { width: 100%; height: 100%; }

  /* GIF label chip — pixel font */
  .chip {
    position: absolute; left: 8px; top: 8px;
    background: rgba(10,10,10,0.85);
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px;
    font-family: var(--font-body);
  }
  .chip .dot { width: 6px; height: 6px; background: var(--accent-music); }
  .chip .lbl { font-size: 7px; color: var(--fg); }

  /* thin 1-cell border to signal "frame" */
  .border { position: absolute; inset: 0;
            border: 1px solid rgba(242,242,242,0.08); pointer-events: none; }
</style>
</head>
<body>
  <div class="screen" data-screen-label="gif">
    <div class="px" id="px"></div>
    <div class="border"></div>
    <div class="chip">
      <span class="dot"></span>
      <span class="lbl">GIF</span>
    </div>
  </div>

<script>
  // 15-col × 20-row pixel sunset — each cell maps 1:1 to Pillow draw.rectangle().
  const COLS = 15, ROWS = 20;
  const RIDGE = [14,12,11,9,10,12,10,8,9,11,12,11,10,12,14];
  const STARS = new Set(['2,1','12,2','5,3','10,4','1,5','13,5']);
  const SUN_CX = 7, SUN_CY = 7, SUN_R = 2.7, HORIZON = 15;
  const WARM = '#E8C97A';
  const MOUNT = '#15161f', LAND = '#0c0c0c', GLOW = '#3a2418';

  function sky(r) {
    if (r <= 1)  return '#0b1226';
    if (r <= 3)  return '#16213f';
    if (r <= 5)  return '#2a2350';
    if (r <= 7)  return '#5a2f5c';
    if (r <= 9)  return '#9a4257';
    if (r <= 11) return '#cf6a39';
    return '#e69a4a';
  }
  function cell(r, c) {
    let col = sky(r);
    if (r <= HORIZON && Math.hypot(c - SUN_CX, r - SUN_CY) <= SUN_R) col = WARM;
    if (RIDGE[c] <= r && r <= HORIZON) col = MOUNT;
    if (r > HORIZON) col = LAND;
    if (r === 16 && Math.abs(c - SUN_CX) <= 2) col = GLOW;
    if (r === 17 && Math.abs(c - SUN_CX) <= 1) col = GLOW;
    if (STARS.has(c+','+r) && col === sky(r)) col = '#F2F2F2';
    return col;
  }

  const px = document.getElementById('px');
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const d = document.createElement('div');
      d.style.background = cell(r, c);
      px.appendChild(d);
    }
</script>
</body>
</html>
