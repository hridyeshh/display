<!-- @startingPoint section="Widgets" subtitle="Checklist with done count" viewport="240x320" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=240, height=320">
<title>Desky · Tasks</title>
<link rel="stylesheet" href="styles.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; background: #000;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; image-rendering: pixelated;
  }
  .screen {
    width: 240px; height: 320px; background: var(--bg); color: var(--fg);
    overflow: hidden; display: flex; flex-direction: column; padding: 18px;
    font-family: var(--font-body);
  }
  .header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 12px; border-bottom: 1px solid var(--line);
  }
  .header .t { font-size: 7px; color: var(--fg-muted); }
  .header .f { font-size: 7px; color: var(--accent-done); }

  .list { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 6px; }
  .task { display: flex; align-items: center; gap: 10px; cursor: pointer; height: 30px; }
  .box { width: 14px; height: 14px; flex: none; border: 2px solid var(--fg-dim); }
  .task.done .box { background: var(--accent-done); border-color: var(--accent-done);
                    display: flex; align-items: center; justify-content: center; }
  /* pixel checkmark: 3x3 L-shape */
  .chk { display: none; }
  .task.done .chk { display: block; }
  .txt { font-size: 7px; color: var(--fg); white-space: nowrap;
         overflow: hidden; text-overflow: ellipsis; line-height: 1.6; }
  .task.done .txt { color: var(--fg-dim); text-decoration: line-through;
                    text-decoration-color: var(--fg-dim); }

  .foot { display: flex; flex-direction: column; gap: 8px; padding-top: 12px;
          border-top: 1px solid var(--line); }
  .foot .cap { font-size: 6px; color: var(--fg-muted); }
  .pbar { height: 4px; background: var(--line); }
  .pbar .fill { height: 100%; background: var(--accent-done); }
</style>
</head>
<body>
  <div class="screen" data-screen-label="tasks">
    <div class="header">
      <span class="t">TASKS</span>
      <span class="f" id="frac">2/5</span>
    </div>
    <div class="list" id="list"></div>
    <div class="foot">
      <span class="cap" id="cap">2 OF 5 DONE</span>
      <div class="pbar"><div class="fill" id="pfill"></div></div>
    </div>
  </div>

<script>
  /* pixel checkmark as SVG rects — 3×3 with L-shape */
  const CHK = `<svg class="chk" width="10" height="10" viewBox="0 0 10 10" style="image-rendering:pixelated">
    <rect x="1" y="6" width="2" height="2" fill="#0A0A0A"/>
    <rect x="3" y="8" width="2" height="2" fill="#0A0A0A"/>
    <rect x="5" y="4" width="2" height="2" fill="#0A0A0A"/>
    <rect x="7" y="2" width="2" height="2" fill="#0A0A0A"/>
  </svg>`;

  const TASKS = [
    { t:'Solder SPI displays',    done: true  },
    { t:'Deploy Go backend',      done: true  },
    { t:'Wire Last.fm scrobbles', done: false },
    { t:'Design GIF widget',      done: false },
    { t:'3D-print enclosure',     done: false },
  ];

  function render() {
    const done = TASKS.filter(t => t.done).length, n = TASKS.length;
    const list = document.getElementById('list');
    list.innerHTML = '';
    TASKS.forEach((task, i) => {
      const row = document.createElement('div');
      row.className = 'task' + (task.done ? ' done' : '');
      row.innerHTML = `<span class="box">${CHK}</span><span class="txt">${task.t}</span>`;
      row.onclick = () => { TASKS[i].done = !TASKS[i].done; render(); };
      list.appendChild(row);
    });
    document.getElementById('frac').textContent  = done + '/' + n;
    document.getElementById('cap').textContent   = done + ' OF ' + n + ' DONE';
    document.getElementById('pfill').style.width = (done/n*100) + '%';
  }
  render();
</script>
</body>
</html>
